name: NixOS Validate

on:
  pull_request:
    paths:
      - 'nixos/**'
      - '.github/workflows/*-nixos*.yml'
  push:
    branches:
      - main
    paths:
      - 'nixos/**'
      - '.github/workflows/*-nixos*.yml'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Check Flake
        working-directory: nixos
        run: nix flake check --no-build

      - name: Build Configuration (dry-run)
        working-directory: nixos
        run: |
          echo "Building NixOS configuration..."
          nix build .#nixosConfigurations.vps.config.system.build.toplevel --dry-run
          echo "Configuration is valid!"

      - name: Build Configuration (full build)
        working-directory: nixos
        run: |
          echo "Building NixOS system..."
          nix build .#nixosConfigurations.vps.config.system.build.toplevel
          echo "Build successful!"
