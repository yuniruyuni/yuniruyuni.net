name: NixOS Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'nixos/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy NixOS Configuration
    runs-on: ubuntu-latest
    environment: apply

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          nix_path: nixpkgs=channel:nixos-24.11

      - name: Install cloudflared
        run: |
          CLOUDFLARED_VERSION="2026.3.0"
          curl -L "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64" -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Setup SSH with cloudflared
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # SSH private key for VPS authentication
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Known hosts from repository
          cp ssh/known_hosts ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Configure SSH to use cloudflared for tunnel access
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.yuniruyuni.net
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          ssh -o ConnectTimeout=10 yuniruyuni@ssh.yuniruyuni.net "echo 'SSH connection successful'"

      - name: Copy NixOS configuration to VPS
        run: |
          ssh yuniruyuni@ssh.yuniruyuni.net "mkdir -p /tmp/nixos-config"
          scp -r nixos/* yuniruyuni@ssh.yuniruyuni.net:/tmp/nixos-config/

      - name: Deploy NixOS configuration
        run: |
          ssh yuniruyuni@ssh.yuniruyuni.net << 'DEPLOY'
          set -e

          # Backup current configuration
          sudo cp -r /etc/nixos /etc/nixos.bak.$(date +%Y%m%d%H%M%S)

          # Copy new configuration
          sudo cp -r /tmp/nixos-config/* /etc/nixos/

          # Build and switch to new configuration
          cd /etc/nixos
          sudo nixos-rebuild switch --flake .#vps

          # Cleanup
          rm -rf /tmp/nixos-config

          echo "NixOS deployment completed successfully!"
          DEPLOY

      - name: Verify deployment
        run: |
          ssh yuniruyuni@ssh.yuniruyuni.net << 'VERIFY'
          echo "=== System Info ==="
          nixos-version

          echo "=== Service Status ==="
          sudo systemctl is-active cloudflared || echo "cloudflared: not active"
          sudo systemctl is-active podman-n8n || echo "podman-n8n: not active"
          VERIFY
