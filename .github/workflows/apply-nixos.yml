name: NixOS Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'nixos/**'
      - '.github/workflows/apply-nixos.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy NixOS Configuration
    runs-on: ubuntu-latest
    environment: apply

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Install cloudflared
        run: |
          CLOUDFLARED_VERSION="2026.6.0"
          curl -L "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64" -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Setup SSH with cloudflared
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # SSH private key for VPS authentication
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Known hosts from repository
          cp ssh/known_hosts ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Configure SSH to use cloudflared for tunnel access
          cat >> ~/.ssh/config << 'EOF'
          Host ssh.yuniruyuni.net
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: |
          ssh -o ConnectTimeout=10 yuniruyuni@ssh.yuniruyuni.net "echo 'SSH connection successful'"

      - name: Copy NixOS configuration to VPS
        run: |
          ssh yuniruyuni@ssh.yuniruyuni.net "mkdir -p /tmp/nixos-config"
          scp -r nixos/* yuniruyuni@ssh.yuniruyuni.net:/tmp/nixos-config/

      - name: Deploy NixOS configuration
        run: |
          ssh yuniruyuni@ssh.yuniruyuni.net "DEPLOY_UNIT='nixos-github-deploy-${GITHUB_RUN_ID}' bash -s" << 'DEPLOY'
          set -euo pipefail

          deploy_script="/tmp/${DEPLOY_UNIT}.sh"
          deploy_log="/tmp/${DEPLOY_UNIT}.log"

          cat > "$deploy_script" << SCRIPT
          #!/run/current-system/sw/bin/bash
          set -euo pipefail
          exec > >(tee -a "$deploy_log") 2>&1

          echo "Starting NixOS deployment at \$(date --iso-8601=seconds)"

          # Avoid unrelated failed units or a timed backup colliding with the
          # activation while PostgreSQL is being restarted.
          systemctl reset-failed podman-n8n.service postgresql-backup.service || true
          systemctl stop postgresql-backup.timer postgresql-backup.service || true

          # Backup current configuration
          cp -r /etc/nixos /etc/nixos.bak.\$(date +%Y%m%d%H%M%S)

          # Copy new configuration
          cp -r /tmp/nixos-config/* /etc/nixos/

          # Build and switch to new configuration. This may restart cloudflared,
          # so it must not depend on the GitHub Actions SSH session staying up.
          cd /etc/nixos
          nixos-rebuild switch --flake .#vps

          # Cleanup
          rm -rf /tmp/nixos-config
          rm -f "$deploy_script"

          echo "NixOS deployment completed successfully!"
          SCRIPT

          chmod +x "$deploy_script"
          : > "$deploy_log"

          sudo systemd-run \
            --unit="$DEPLOY_UNIT" \
            --description="GitHub Actions NixOS deployment" \
            --setenv=PATH=/run/wrappers/bin:/run/current-system/sw/bin:/usr/bin:/bin \
            --property=Type=exec \
            /run/current-system/sw/bin/bash "$deploy_script"
          DEPLOY

      - name: Verify deployment
        run: |
          DEPLOY_UNIT="nixos-github-deploy-${GITHUB_RUN_ID}"

          ssh_retry() {
            local attempt
            for attempt in $(seq 1 90); do
              if ssh -o ConnectTimeout=20 yuniruyuni@ssh.yuniruyuni.net "$@"; then
                return 0
              fi
              echo "SSH attempt ${attempt} failed; retrying in 20 seconds..."
              sleep 20
            done
            return 1
          }

          deploy_completed=0

          for attempt in $(seq 1 90); do
            set +e
            output="$(ssh -o ConnectTimeout=20 yuniruyuni@ssh.yuniruyuni.net "DEPLOY_UNIT='$DEPLOY_UNIT' bash -s" << 'STATUS'
          set -euo pipefail
          if systemctl is-active --quiet "$DEPLOY_UNIT"; then
            echo "running"
            exit 10
          fi

          result="$(systemctl show "$DEPLOY_UNIT" -P Result 2>/dev/null || true)"
          if [ "$result" = "success" ]; then
            echo "success"
            exit 0
          fi

          echo "failed:${result:-unknown}"
          sudo journalctl -u "$DEPLOY_UNIT" --no-pager -n 120 || true
          exit 1
          STATUS
            )"
            status=$?
            set -e

            echo "$output"

            if [ "$status" -eq 0 ]; then
              deploy_completed=1
              break
            fi
            if [ "$status" -eq 1 ]; then
              exit 1
            fi

            echo "Deployment is still running; checking again in 20 seconds..."
            sleep 20
          done

          if [ "$deploy_completed" -ne 1 ]; then
            echo "Deployment did not finish within the timeout."
            exit 1
          fi

          ssh_retry '
          echo "=== System Info ==="
          nixos-version

          echo "=== Service Status ==="
          sudo systemctl is-active cloudflared || echo "cloudflared: not active"
          sudo systemctl is-active podman-n8n || echo "podman-n8n: not active"
          sudo podman ps --filter name=n8n --format "{{.Image}} {{.Status}}"
          '
