name: Terraform Plan (Comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/plan')
    runs-on: ubuntu-latest
    environment: plan

    steps:
      - name: Check permissions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed('Insufficient permissions to trigger plan');
            }

      - name: Get PR ref
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.head.sha);

      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.10"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        # -lock=false matches plan-terraform.yml: plan SA has objectViewer (not objectAdmin)
        # on the state bucket after b212461, so it cannot acquire the state lock.
        run: terraform plan -no-color -lock=false -out=tfplan
        env:
          # See plan-terraform.yml for the Read-only scope contract on this token.
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_vps_ip_address: ${{ secrets.VPS_IP_ADDRESS }}
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_owner_email: ${{ secrets.OWNER_EMAIL }}
          TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          COMMENTER: ${{ github.event.comment.user.login }}
        with:
          script: |
            const marker = '<!-- terraform-plan-comment -->';
            const body = `${marker}
            #### Terraform Plan \`${process.env.PLAN_OUTCOME}\` (triggered by /plan)

            <details><summary>Show Plan</summary>

            \`\`\`
            ${process.env.PLAN_OUTPUT}
            \`\`\`

            </details>

            *Triggered by: @${process.env.COMMENTER}*`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
