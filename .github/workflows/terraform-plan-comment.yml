name: Terraform Plan (Comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/plan')
    runs-on: ubuntu-latest
    environment: terraform-plan

    steps:
      - name: Check permissions
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed('Insufficient permissions to trigger plan');
            }

      - name: Get PR ref
        id: pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.head.sha);

      - name: Checkout PR code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_vps_ip_address: ${{ secrets.VPS_IP_ADDRESS }}
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          COMMENTER: ${{ github.event.comment.user.login }}
        with:
          script: |
            const body = `#### Terraform Plan \`${process.env.PLAN_OUTCOME}\` (triggered by /plan)

            <details><summary>Show Plan</summary>

            \`\`\`
            ${process.env.PLAN_OUTPUT}
            \`\`\`

            </details>

            *Triggered by: @${process.env.COMMENTER}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
